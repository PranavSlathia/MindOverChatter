services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - server
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5173/').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - moc-net

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://moc:${DB_PASSWORD:?DB_PASSWORD is required}@db:5432/moc
      - WHISPER_SERVICE_URL=http://whisper:8001
      - EMOTION_SERVICE_URL=http://emotion:8002
      - TTS_SERVICE_URL=http://tts:8003
      - MEMORY_SERVICE_URL=http://memory:8004
      - VOICE_SERVICE_URL=http://voice:8005
    volumes:
      - audio-data:/app/volumes/audio
      - ~/.claude:/root/.claude:ro
      - ~/.claude.json:/root/.claude.json:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>{process.exit(r.ok?0:1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - moc-net

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: moc
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: moc
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moc"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - moc-net

  whisper:
    build:
      context: services/whisper
    ports:
      - "8001:8001"
    volumes:
      - audio-data:/app/volumes/audio:ro
      - model-cache:/app/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - moc-net

  emotion:
    build:
      context: services/emotion
    ports:
      - "8002:8002"
    volumes:
      - audio-data:/app/volumes/audio:ro
      - model-cache:/app/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - moc-net

  tts:
    build:
      context: services/tts
    ports:
      - "8003:8003"
    volumes:
      - audio-data:/app/volumes/audio
      - model-cache:/app/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - moc-net

  memory:
    build:
      context: services/memory
    ports:
      - "8004:8004"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=moc
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=moc
      - GROQ_API_KEY=${GROQ_API_KEY}
      - HF_HOME=/app/models
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - model-cache:/app/models
    networks:
      - moc-net

  voice:
    build:
      context: services/voice
    ports:
      - "8005:8005"
    environment:
      - DAILY_API_KEY=${DAILY_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CARTESIA_API_KEY=${CARTESIA_API_KEY}
      - CARTESIA_VOICE_ID=${CARTESIA_VOICE_ID:-95d51f79-c397-46f9-b49a-23763d3eaa2d}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-sonnet}
      - GROQ_LLM_MODEL=${GROQ_LLM_MODEL:-llama-3.3-70b-versatile}
      - MOC_BACKEND_URL=http://host.docker.internal:3000
      - EMOTION_SERVICE_URL=http://emotion:8002
      - VOICE_PORT=8005
    volumes:
      - ~/.claude:/root/.claude:ro
      - ~/.claude.json:/root/.claude.json:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - moc-net

volumes:
  pgdata:
  audio-data:
  model-cache:

networks:
  moc-net:
    driver: bridge
